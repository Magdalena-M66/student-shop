<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
    <meta name="google-site-verification" content="google1234567890abcdef" />
<title>Student Shop</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

.products{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.product{
    background:white;
    border-radius:8px;
    padding:20px;
    width:220px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
}

button{
    background:#27ae60;
    color:white;
    border:none;
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    background:#219150;
}

footer{
    text-align:center;
    padding:15px;
    background:#2c3e50;
    color:white;
}

</style>
</head>

<body>

<header>
<h1>Student Online Shop</h1>
<p>Проект по Уеб дизайн</p>
</header>

<section class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Тениска</h3>
<p>Цена: 20 лв.</p>
<button>Купи</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Слушалки</h3>
<p>Цена: 50 лв.</p>
<button>Купи</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Раница</h3>
<p>Цена: 35 лв.</p>
<button>Купи</button>
</div>

</section>

<footer>
<p>© 2026 Student Shop</p>
</footer>

</body>

</html>
